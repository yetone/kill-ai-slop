name: Scanner tests

on:
  push:
    branches: [main]
    paths:
      - "skill/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "skill/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run scanner tests
        run: node --test skill/scripts/scan.test.mjs
